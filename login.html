<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

  <div class="login-container">
    <div class="avatar">🎓</div>

    <h2>Login</h2>

    <form class="login-box" id="loginForm">

      <div class="role-buttons">
        <button type="button" class="role-btn" onclick="seleccionarRol(this)">Admin</button>
        <button type="button" class="role-btn" onclick="seleccionarRol(this)">Alumno</button>
        <button type="button" class="role-btn" onclick="seleccionarRol(this)">Depto</button>
      </div>

      <div class="input-group">
        <input type="email" id="correo" placeholder="Correo electrónico" required>
      </div>

      <div class="input-group password-group">
        <input id="password" type="password" placeholder="Contraseña" required>
        <span class="eye" onclick="verPassword()">👁</span>
      </div>

      <div class="options">
        <label><input type="checkbox"> Recordarme</label>
        <a href="recuperar.html">¿Olvidaste?</a>
      </div>

      <button type="submit" class="login-btn">Login</button>

      <div class="extra-links">
        <span>¿No tienes cuenta?</span>
        <a href="registro.html">Registrarse</a>
      </div>

    </form>
  </div>

<script>
  function verPassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
  }

  let rolSeleccionado = "";

  function seleccionarRol(boton) {
    document.querySelectorAll(".role-btn").forEach(btn => btn.classList.remove("active"));
    boton.classList.add("active");
    rolSeleccionado = boton.textContent.trim();
  }

  document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const correo = document.getElementById("correo").value;
    const password = document.getElementById("password").value;

    if (rolSeleccionado === "") {
      alert("Debes seleccionar un rol");
      return;
    }

    if (rolSeleccionado === "Admin" && correo === "admin@duocuc.cl" && password === "1234") {
      window.location.href = "admin.html";
    } 
    else if (rolSeleccionado === "Alumno" && correo === "alumno@duocuc.cl" && password === "1234") {
      window.location.href = "alumno.html";
    } 
    else if (rolSeleccionado === "Depto" && correo === "depto@duocuc.cl" && password === "1234") {
      window.location.href = "depto.html";
    } 
    else {
      alert("Rol, correo o contraseña incorrectos");
    }
  });
</script>

</body>
</html>
