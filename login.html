<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

  <div class="login-container">
    <div class="avatar">🎓</div>

    <h2>Login</h2>

    <form class="login-box">

      <!-- ROLES -->
      <div class="role-buttons">
        <button type="button" class="role-btn" onclick="seleccionarRol(this)">Admin</button>
        <button type="button" class="role-btn" onclick="seleccionarRol(this)">Alumno</button>
        <button type="button" class="role-btn" onclick="seleccionarRol(this)">Depto</button>
      </div>

      <!-- EMAIL -->
      <div class="input-group">
        <input type="email" placeholder="Correo electrónico" required>
      </div>

      <!-- PASSWORD -->
      <div class="input-group password-group">
        <input id="password" type="password" placeholder="Contraseña" required>
        <span class="eye" onclick="verPassword()">👁</span>
      </div>

      <!-- OPCIONES -->
      <div class="options">
        <label><input type="checkbox"> Recordarme</label>
        <a href="recuperar.html">¿Olvidaste?</a>
      </div>

      <!-- BOTÓN -->
      <button type="submit" class="login-btn">Login</button>

      <!-- LINKS -->
      <div class="extra-links">
        <span>¿No tienes cuenta?</span>
        <a href="registro.html">Registrarse</a>
      </div>

    </form>
  </div>

  <!-- SCRIPT -->
  <script>
  function verPassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
  }

  function seleccionarRol(boton) {
    const botones = document.querySelectorAll(".role-btn");
    botones.forEach(btn => btn.classList.remove("active"));
    boton.classList.add("active");
  }
</script>

</body>
</html>
